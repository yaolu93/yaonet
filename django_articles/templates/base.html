<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if title %}{{ title }}{% else %}Django Articles{% endif %}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f7f7f8; color: #1e1e1e; }
    .nav { background: #111827; color: #fff; padding: 12px 20px; display: flex; gap: 16px; }
    .nav a { color: #d1d5db; text-decoration: none; }
    .nav a:hover { color: #fff; }
    .container { max-width: 1040px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .muted { color: #6b7280; }
    .badge { display: inline-block; background: #374151; color: #fff; border-radius: 999px; padding: 2px 10px; font-size: 12px; }
    .row { display: flex; gap: 24px; }
    .sidebar { width: 220px; }
    .main { flex: 1; }
    .btn { display: inline-block; border: 1px solid #1f2937; background: #1f2937; color: #fff; padding: 8px 12px; border-radius: 6px; text-decoration: none; cursor: pointer; }
    .btn.alt { background: #fff; color: #1f2937; }
    .form-control { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .mt-3 { margin-top: 12px; }
    .flash { margin-bottom: 12px; padding: 10px; border: 1px solid #bfdbfe; border-radius: 6px; background: #eff6ff; }
    ul { padding-left: 18px; }
    @media (max-width: 900px) {
      .row { flex-direction: column; }
      .sidebar { width: auto; }
    }
  </style>
</head>
<body>
  <div class="nav">
    <a href="{% url 'articles:list' %}">Articles</a>
    <a href="/admin/">Admin</a>
  </div>
  <div class="container">
    {% if messages %}
      {% for message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
