{% extends 'base.html' %}

{% block content %}
<div class="card">
  <h2 class="mb-3">{{ title }}</h2>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="mb-2" for="id_title">Title</label>
      {{ form.title }}
    </div>
    <div class="mb-3">
      <label class="mb-2" for="id_category">Category</label>
      {{ form.category }}
    </div>
    <div class="mb-3">
      <label class="mb-2" for="id_summary">Summary</label>
      {{ form.summary }}
    </div>
    <div class="mb-3">
      <label class="mb-2" for="id_body">Body</label>
      {{ form.body }}
    </div>
    <button class="btn" type="submit">Save</button>
    <a class="btn alt" href="{% url 'articles:list' %}">Cancel</a>
  </form>
</div>
{% endblock %}
