---
# Quick health check playbook
# Usage: ansible-playbook health-check.yml -i inventory

- name: Health check for all services
  hosts: all
  tasks:
    - name: Check system connectivity
      ping:

    - name: Check uptime
      command: uptime
      register: uptime_result
      changed_when: false

    - name: Display uptime
      debug:
        msg: "{{ uptime_result.stdout }}"

- name: Check application services
  hosts: webservers
  tasks:
    - name: Check Flask application is running
      uri:
        url: "http://127.0.0.1:8000"
        method: GET
      register: app_status
      ignore_errors: yes

    - name: Check Nginx is running
      systemd:
        name: nginx
        state: started
      check_mode: yes
      register: nginx_status

    - name: Display application health
      debug:
        msg: "Application status code: {{ app_status.status | default('unable to reach') }}"

- name: Check database connectivity
  hosts: webservers
  tasks:
    - name: Test PostgreSQL connection
      shell: |
        source {{ venv_path }}/bin/activate
        python -c "import psycopg2; psycopg2.connect('host={{ groups['dbservers'][0] }} user={{ postgres_user }} password={{ postgres_password }} database=microblog_db')"
      become_user: "{{ app_user }}"
      register: db_test
      ignore_errors: yes

    - name: Display database status
      debug:
        msg: "Database connection: {{ 'OK' if db_test.rc == 0 else 'FAILED' }}"

- name: Check Redis connectivity
  hosts: webservers
  tasks:
    - name: Test Redis connection
      shell: |
        source {{ venv_path }}/bin/activate
        python -c "import redis; r = redis.Redis(host='{{ groups['cacheservers'][0] }}', port=6379); r.ping()"
      become_user: "{{ app_user }}"
      register: redis_test
      ignore_errors: yes

    - name: Display Redis status
      debug:
        msg: "Redis connection: {{ 'OK' if redis_test.rc == 0 else 'FAILED' }}"
