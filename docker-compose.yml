version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: yaonet
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:6-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  web:
    build: .
    command: gunicorn yaonet:app -b 0.0.0.0:8080 -w 4 --log-level debug --access-logfile - --error-logfile -
    ports:
      - "8000:8080"
    depends_on:
      - db
      - redis
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://postgres:example@db:5432/yaonet
      - REDIS_URL=redis://redis:6379/0
      - PRODUCTS_SERVICE_URL=http://products:8080
      - ELASTICSEARCH_URL=
      - RUN_MIGRATIONS=true
      - LOG_TO_STDOUT=true
      - FLASK_DEBUG=1
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/home/yaonet
    restart: always

  django_articles:
    build:
      context: .
      dockerfile: django_articles/Dockerfile
    command: sh -c "python manage.py migrate --fake-initial && gunicorn project.wsgi:application -b 0.0.0.0:8001 -w 2"
    ports:
      - "8001:8001"
    depends_on:
      - db
    environment:
      - DJANGO_DEBUG=1
      - DJANGO_ALLOWED_HOSTS=*
      - DATABASE_URL=postgresql://postgres:example@db:5432/yaonet
      - PYTHONUNBUFFERED=1
    restart: always

  products:
    build:
      context: ./yaonet-products
    container_name: yaonet-products
    ports:
      - "8080:8080"
    depends_on:
      - db
      - kafka
      - rabbitmq
    environment:
      - SERVER_PORT=8080
      - PRODUCTS_DB_URL=jdbc:postgresql://db:5432/yaonet
      - PRODUCTS_DB_USER=postgres
      - PRODUCTS_DB_PASSWORD=example
      - FLASK_AUTH_BASE_URL=http://web:8000/api
      - MESSAGING_ENABLED=true
      - KAFKA_ENABLED=true
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_PRODUCT_EVENTS=yaonet.product.events
      - KAFKA_TOPIC_PRODUCT_EVENTS_DLT=yaonet.product.events.DLT
      - KAFKA_CONSUMER_ENABLED=true
      - RABBITMQ_ENABLED=true
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_VHOST=/
      - RABBITMQ_PRODUCT_EVENTS_QUEUE=yaonet.product.events
      - RABBITMQ_PRODUCT_EVENTS_DLX=yaonet.product.events.dlx
      - RABBITMQ_PRODUCT_EVENTS_DLQ=yaonet.product.events.dlq
      - RABBITMQ_PRODUCT_EVENTS_DLQ_ROUTING_KEY=yaonet.product.events.dlq
      - RABBITMQ_CONSUMER_ENABLED=true
      - OUTBOX_DISPATCH_INTERVAL_MS=2000
    restart: always

  worker:
    build: .
    command: rq worker yaonet-tasks
    depends_on:
      - redis
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:example@db:5432/yaonet
      - REDIS_URL=redis://redis:6379/0
      - RUN_MIGRATIONS=false
      - LOG_TO_STDOUT=true
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/home/yaonet
    restart: always

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    restart: always

  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    restart: always

