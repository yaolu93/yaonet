input {
  # 从应用接收日志（Python SocketHandler）
  tcp {
    port => 5000
    codec => json
    type => "microblog"
  }
  
  # 也可以通过 HTTP 接收日志
  http {
    port => 9600
    type => "microblog"
  }
}

filter {
  # 解析 JSON 格式的日志
  if [type] == "microblog" {
    # 确保有时间戳
    if ![timestamp] {
      ruby {
        code => 'event.set("@timestamp", Time.now.utc)'
      }
    } else {
      date {
        match => [ "timestamp", "yyyy-MM-dd HH:mm:ss" ]
        target => "@timestamp"
      }
    }
  }
}

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "microblog-logs-%{+YYYY.MM.dd}"
  }
  
  # 同时输出到控制台用于调试
  stdout {
    codec => rubydebug
  }
}
