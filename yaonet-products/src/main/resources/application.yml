server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: yaonet-products
  datasource:
    url: ${PRODUCTS_DB_URL:jdbc:postgresql://localhost:5432/yaonet_db}
    username: ${PRODUCTS_DB_USER:yaonet_user}
    password: ${PRODUCTS_DB_PASSWORD:yaonet_secure_pwd_2024}
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

flask:
  auth:
    base-url: ${FLASK_AUTH_BASE_URL:http://localhost:5000/api}
