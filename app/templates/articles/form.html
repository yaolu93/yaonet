{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 mt-4">
    <h2>{{ title }}</h2>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Title *</label>
        <input type="text" name="title" class="form-control"
               value="{{ article.title if article else '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Category</label>
        <select name="category" class="form-select">
          {% for cat in categories %}
          <option value="{{ cat }}"
            {% if article and article.category == cat %}selected{% endif %}>
            {{ cat | capitalize }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Summary</label>
        <input type="text" name="summary" class="form-control"
               value="{{ article.summary if article else '' }}"
               placeholder="One-line description (optional)">
      </div>
      <div class="mb-3">
        <label class="form-label">Body * (HTML supported)</label>
        <textarea name="body" class="form-control" rows="16" required>{{ article.body if article else '' }}</textarea>
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{{ url_for('articles.list_articles') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
