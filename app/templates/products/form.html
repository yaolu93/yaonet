{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-8">
    <h2>{{ title }}</h2>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Name *</label>
        <input type="text" class="form-control" name="name" value="{{ product.name if product else '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" name="description" rows="4">{{ product.description if product else '' }}</textarea>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Price *</label>
          <input type="number" step="0.01" min="0" class="form-control" name="price" value="{{ product.price if product else '0.00' }}" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Stock *</label>
          <input type="number" min="0" class="form-control" name="stock" value="{{ product.stock if product else '0' }}" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Image URL</label>
        <input type="url" class="form-control" name="image_url" value="{{ product.imageUrl if product else '' }}">
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{{ url_for('products.manage_products') }}" class="btn btn-outline-secondary ms-2">Back</a>
    </form>
  </div>
</div>
{% endblock %}
