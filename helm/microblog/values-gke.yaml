# GKE production values override
# Usage: helm install microblog ./helm/microblog -f helm/microblog/values-gke.yaml

global:
  environment: production

image:
  repository: asia-east1-docker.pkg.dev/microblog-487821/microblog/microblog
  tag: latest
  pullPolicy: IfNotPresent

app:
  flaskEnv: production
  logLevel: info

secrets:
  secretKey: "CHANGE-ME-IN-PRODUCTION!!!"
  postgres:
    password: "CHANGE-ME-IN-PRODUCTION!!!"

postgres:
  storage:
    size: 20Gi  # Larger storage for production
    storageClass: standard
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

redis:
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

web:
  replicaCount: 2
  service:
    type: LoadBalancer  # Use LoadBalancer for GKE
    port: 80
    targetPort: 8000
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

worker:
  replicaCount: 2
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

webAutoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

workerAutoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

ingress:
  enabled: true
  className: gce
  hosts:
    - host: microblog.example.com
      paths:
        - path: /
          pathType: Prefix
  managedCertificate:
    enabled: true
    domains:
      - microblog.example.com

workloadIdentity:
  enabled: true
  googleServiceAccount: gke-microblog-sa@microblog-487821.iam.gserviceaccount.com
  kubernetesServiceAccount: microblog-ksa

podAntiAffinity:
  enabled: true  # Spread across nodes for better availability
