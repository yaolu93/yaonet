# Helm Values for Yaonet Application
# This is the default values file. Override with environment-specific files:
# - values-minikube.yaml for local Minikube development
# - values-gke.yaml for Google Kubernetes Engine production

# Global settings
global:
  environment: development
  imagePullPolicy: IfNotPresent
  namespace: yaonet

# Namespace
namespace:
  create: true
  name: yaonet

# Image configuration
image:
  repository: yaonet
  tag: latest
  pullPolicy: IfNotPresent

# Application configuration
app:
  name: yaonet
  flaskEnv: development
  postsPerPage: 25
  logLevel: debug

# Secret configuration (CHANGE IN PRODUCTION!)
secrets:
  postgres:
    user: postgres
    password: example
    database: yaonet
  secretKey: "you-will-never-guess"

# PostgreSQL configuration
postgres:
  enabled: true
  name: postgres
  image: postgres:13
  port: 5432
  replicaCount: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  storage:
    size: 5Gi
    storageClass: standard
  persistence:
    enabled: true

# Redis configuration
redis:
  enabled: true
  name: redis
  image: redis:6-alpine
  port: 6379
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  persistence:
    enabled: false  # Redis ephemeral for cache

# Web (Flask) application
web:
  enabled: true
  name: web
  replicaCount: 2
  port: 8000
  image: yaonet  # Uses global image settings
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  service:
    type: LoadBalancer
    port: 80
    targetPort: 8000
  livenessProbe:
    httpGet:
      path: /
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 5
  env:
    - name: FLASK_APP
      value: yaonet.py
    - name: FLASK_ENV
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: FLASK_ENV
    - name: REDIS_URL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: REDIS_URL
    - name: DATABASE_URL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: DATABASE_URL
    - name: POSTS_PER_PAGE
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: POSTS_PER_PAGE
    - name: SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: SECRET_KEY
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: POSTGRES_PASSWORD
    - name: RUN_MIGRATIONS
      value: "true"
    - name: LOG_TO_STDOUT
      value: "true"
    - name: PYTHONUNBUFFERED
      value: "1"

# Worker (RQ) configuration
worker:
  enabled: true
  name: worker
  replicaCount: 1
  image: yaonet  # Uses global image settings
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  env:
    - name: FLASK_APP
      value: yaonet.py
    - name: FLASK_ENV
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: FLASK_ENV
    - name: REDIS_URL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: REDIS_URL
    - name: DATABASE_URL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: DATABASE_URL
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: POSTGRES_PASSWORD
    - name: RUN_MIGRATIONS
      value: "false"
    - name: LOG_TO_STDOUT
      value: "true"
    - name: PYTHONUNBUFFERED
      value: "1"

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Web autoscale
webAutoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# Worker autoscale
workerAutoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Ingress configuration
ingress:
  enabled: false  # Disabled by default, enable for production with custom domain
  className: gce
  hosts:
    - host: yaonet.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: yaonet-tls
      hosts:
        - yaonet.example.com
  managedCertificate:
    enabled: false
    domains:
      - yaonet.example.com

# Workload Identity (GKE specific)
workloadIdentity:
  enabled: false  # Enable for GKE
  googleServiceAccount: ""
  kubernetesServiceAccount: yaonet-ksa

# Anti-affinity rules
podAntiAffinity:
  enabled: false  # Enable for production to spread across nodes

# ConfigMap data
configMap:
  FLASK_ENV: development
  REDIS_URL: "redis://redis:6379/0"
  DATABASE_URL: "postgresql://postgres:example@postgres:5432/yaonet"
  POSTS_PER_PAGE: "25"
